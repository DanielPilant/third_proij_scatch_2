<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskMaster</title>
    <link rel="stylesheet" href="client/style/style.css" />
  </head>
  <body>
    <!-- ========== NAVBAR (hidden on auth pages) ========== -->
    <div id="navbar" class="navbar" style="display: none">
      <span class="brand">TaskMaster</span>
      <div class="nav-right">
        <span id="nav-user"></span>
        <button id="logout-btn" class="btn btn-sm btn-danger">Logout</button>
      </div>
    </div>

    <!-- ========== VIEW CONTAINER ========== -->
    <div id="view-container"></div>

    <!-- ========== LOGIN PAGE ========== -->
    <template id="template-login">
      <div class="auth-card">
        <h2>Sign In</h2>
        <form id="login-form">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="you@example.com"
            required
          />
          <label for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            placeholder="Your password"
            required
          />
          <button type="submit" id="login-btn" class="btn btn-primary">
            Login
          </button>
        </form>
        <p class="msg" id="login-msg"></p>
        <p class="form-footer">
          Don't have an account? <a href="#register">Register</a>
        </p>
      </div>
    </template>

    <!-- ========== REGISTER PAGE ========== -->
    <template id="template-register">
      <div class="auth-card">
        <h2>Create Account</h2>
        <form id="register-form">
          <label for="register-name">Name</label>
          <input
            type="text"
            id="register-name"
            placeholder="Your name"
            required
          />
          <label for="register-email">Email</label>
          <input
            type="email"
            id="register-email"
            placeholder="you@example.com"
            required
          />
          <label for="register-password">Password</label>
          <input
            type="password"
            id="register-password"
            placeholder="Min 6 characters"
            required
          />
          <button type="submit" id="register-btn" class="btn btn-primary">
            Register
          </button>
        </form>
        <p class="msg" id="register-msg"></p>
        <p class="form-footer">
          Already have an account? <a href="#login">Sign in</a>
        </p>
      </div>
    </template>

    <!-- ========== TASKS PAGE ========== -->
    <template id="template-tasks">
      <div class="container">
        <div class="task-form">
          <h3 id="form-heading">Add Task</h3>
          <form id="task-form">
            <input
              type="text"
              id="task-title"
              placeholder="Task title"
              required
            />
            <input
              type="text"
              id="task-desc"
              placeholder="Description (optional)"
            />
            <button
              type="submit"
              id="task-submit"
              class="btn btn-primary"
              style="width: auto"
            >
              Add Task
            </button>
          </form>
          <p class="msg" id="task-msg"></p>
        </div>
        <div id="task-list"></div>
      </div>
    </template>

    <!-- Scripts in dependency order -->
    <script src="db.js"></script>
    <script src="authServer.js"></script>
    <script src="appServer.js"></script>
    <script src="dispatcher.js"></script>
    <script src="network/network.js"></script>
    <script src="client/api/fajax.js"></script>
    <script src="client/app.js"></script>
    <script src="client/core/state.js"></script>
    <script src="client/core/router.js"></script>
  </body>
</html>
